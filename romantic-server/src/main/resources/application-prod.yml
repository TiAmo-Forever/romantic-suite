spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:romantic_suite}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

knife4j:
  enable: false
  setting:
    language: zh-CN

logging:
  level:
    root: INFO
    org.love.romantic: INFO
    org.love.romantic.mapper: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.mybatis: DEBUG

romantic:
  storage:
    root-path: /opt/file/romantic
